<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Velha</title>
  <!-- Link para o CSS externo -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== EFEITO DE FAÍSCAS DO MOUSE ===== -->
  <!-- Canvas de tela cheia por baixo de tudo para desenhar as faíscas -->
  <canvas id="sparkCanvas"></canvas>

  <!-- ===== CONTAINER PRINCIPAL ===== -->
  <div class="container">

    <!-- Título do jogo -->
    <h1 class="titulo">jogo da velha</h1>

    <!-- ===== PLACAR ===== -->
    <div class="placar">
      <div class="placar-item" id="placar-x">
        <span class="placar-simbolo x-cor" id="simbolo-x-placar">X</span>
        <span class="placar-label">Jogador X</span>
        <span class="placar-numero" id="vitorias-x">0</span>
      </div>
      <div class="placar-item empates">
        <span class="placar-label">Empates</span>
        <span class="placar-numero" id="empates">0</span>
      </div>
      <div class="placar-item" id="placar-o">
        <span class="placar-simbolo o-cor" id="simbolo-o-placar">O</span>
        <span class="placar-label">Jogador O</span>
        <span class="placar-numero" id="vitorias-o">0</span>
      </div>
    </div>

    <!-- ===== STATUS DO TURNO ===== -->
    <div class="status" id="status">Vez do Jogador X</div>

    <!-- ===== TABULEIRO 3x3 ===== -->
    <div class="tabuleiro" id="tabuleiro">
      <!-- 9 células geradas pelo JS, mas estrutura base aqui -->
      <div class="celula" data-index="0"></div>
      <div class="celula" data-index="1"></div>
      <div class="celula" data-index="2"></div>
      <div class="celula" data-index="3"></div>
      <div class="celula" data-index="4"></div>
      <div class="celula" data-index="5"></div>
      <div class="celula" data-index="6"></div>
      <div class="celula" data-index="7"></div>
      <div class="celula" data-index="8"></div>
    </div>

    <!-- ===== MENSAGEM FINAL (vitória/empate) ===== -->
    <div class="mensagem-final" id="mensagem-final" style="display:none;">
      <p id="texto-resultado"></p>
      <p id="texto-zoeira" class="zoeira"></p>
    </div>

    <!-- ===== BOTÕES DE CONTROLE ===== -->
    <div class="botoes">
      <button class="btn" id="btn-nova-partida">Nova Partida</button>
      <button class="btn btn-secundario" id="btn-resetar">Resetar Placar</button>
      <button class="btn btn-menu" id="btn-menu">☰ Menu</button>
    </div>

  </div><!-- /container -->

  <!-- ===== MODAL DE CUSTOMIZAÇÃO (Menu) ===== -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal">
      <h2 class="modal-titulo">Customização</h2>

      <!-- Escolha do símbolo X -->
      <div class="opcao-grupo">
        <label>Símbolo do Jogador X:</label>
        <div class="simbolos-grid" id="simbolos-x">
          <button class="simbolo-btn ativo" data-jogador="x" data-simbolo="X">X</button>
          <button class="simbolo-btn" data-jogador="x" data-simbolo="O">O</button>
          <button class="simbolo-btn" data-jogador="x" data-simbolo="$">$</button>
          <button class="simbolo-btn" data-jogador="x" data-simbolo="卍">卍</button>
          <button class="simbolo-btn" data-jogador="x" data-simbolo="★">★</button>
          <button class="simbolo-btn" data-jogador="x" data-simbolo="♠">♠</button>
          <button class="simbolo-btn" data-jogador="x" data-simbolo="♦">♦</button>
          <button class="simbolo-btn" data-jogador="x" data-simbolo="⚡">⚡</button>
          <button class="simbolo-btn" data-jogador="x" data-simbolo="🔥">🔥</button>
        </div>
      </div>

      <!-- Cor do símbolo X -->
      <div class="opcao-grupo">
        <label>Cor do X:</label>
        <div class="cores-grid" id="cores-x">
          <button class="cor-btn ativo" data-jogador="x" style="background:#1a6cf5;" data-cor="#1a6cf5"></button>
          <button class="cor-btn" data-jogador="x" style="background:#00e5ff;" data-cor="#00e5ff"></button>
          <button class="cor-btn" data-jogador="x" style="background:#39ff14;" data-cor="#39ff14"></button>
          <button class="cor-btn" data-jogador="x" style="background:#ff00ff;" data-cor="#ff00ff"></button>
          <button class="cor-btn" data-jogador="x" style="background:#ffffff;" data-cor="#ffffff"></button>
          <button class="cor-btn" data-jogador="x" style="background:#f59e0b;" data-cor="#f59e0b"></button>
          <button class="cor-btn" data-jogador="x" style="background:#a855f7;" data-cor="#a855f7"></button>
          <button class="cor-btn" data-jogador="x" style="background:#ff6600;" data-cor="#ff6600"></button>
        </div>
      </div>

      <!-- Escolha do símbolo O -->
      <div class="opcao-grupo">
        <label>Símbolo do Jogador O:</label>
        <div class="simbolos-grid" id="simbolos-o">
          <button class="simbolo-btn ativo" data-jogador="o" data-simbolo="O">O</button>
          <button class="simbolo-btn" data-jogador="o" data-simbolo="X">X</button>
          <button class="simbolo-btn" data-jogador="o" data-simbolo="$">$</button>
          <button class="simbolo-btn" data-jogador="o" data-simbolo="卍">卍</button>
          <button class="simbolo-btn" data-jogador="o" data-simbolo="★">★</button>
          <button class="simbolo-btn" data-jogador="o" data-simbolo="♠">♠</button>
          <button class="simbolo-btn" data-jogador="o" data-simbolo="♦">♦</button>
          <button class="simbolo-btn" data-jogador="o" data-simbolo="⚡">⚡</button>
          <button class="simbolo-btn" data-jogador="o" data-simbolo="🔥">🔥</button>
        </div>
      </div>

      <!-- Cor do símbolo O -->
      <div class="opcao-grupo">
        <label>Cor do O:</label>
        <div class="cores-grid" id="cores-o">
          <button class="cor-btn ativo" data-jogador="o" style="background:#ff2244;" data-cor="#ff2244"></button>
          <button class="cor-btn" data-jogador="o" style="background:#ff8c00;" data-cor="#ff8c00"></button>
          <button class="cor-btn" data-jogador="o" style="background:#ff00ff;" data-cor="#ff00ff"></button>
          <button class="cor-btn" data-jogador="o" style="background:#ffff00;" data-cor="#ffff00"></button>
          <button class="cor-btn" data-jogador="o" style="background:#ffffff;" data-cor="#ffffff"></button>
          <button class="cor-btn" data-jogador="o" style="background:#ec4899;" data-cor="#ec4899"></button>
          <button class="cor-btn" data-jogador="o" style="background:#14b8a6;" data-cor="#14b8a6"></button>
          <button class="cor-btn" data-jogador="o" style="background:#a855f7;" data-cor="#a855f7"></button>
        </div>
      </div>

      <button class="btn" id="btn-fechar-modal">Fechar</button>
    </div>
  </div>

  <!-- Link para o JavaScript externo -->
  <script src="script.js"></script>
</body>
</html>
